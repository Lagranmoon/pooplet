# 生产环境配置 - 使用 GitHub Packages 预构建镜像
# Production configuration - Uses pre-built image from GitHub Packages
#
# 使用方法 / Usage:
#   docker-compose up -d
#
# 使用特定版本 / Use specific version:
#   POOPLE_TAG=v1.0.0 docker-compose up -d

services:
  app:
    image: ${POOPLE_IMAGE:-ghcr.io/lagranmoon/pooplet}:${POOPLE_TAG:-latest}
    container_name: pooplet
    restart: unless-stopped
    ports:
      - "${POOPLE_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 可选: 自定义 JWT 密钥 / Optional: Custom JWT secret
      # - JWT_SECRET=your-secret-key
      # 可选: 禁用注册 / Optional: Disable registration
      # - DISABLE_REGISTRATION=true
    volumes:
      # 持久化 SQLite 数据库 / Persist SQLite database
      - ./data:/app/data
