name: Docker Publish / Docker 发布

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 先运行测试，确保代码质量
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code / 检出代码
        uses: actions/checkout@v4

      - name: Setup Node.js / 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies / 安装依赖
        run: npm ci

      - name: Run linter / 运行代码检查
        run: npm run lint

      - name: Build application / 构建应用
        run: npm run build

      - name: Check TypeScript types / 检查 TypeScript 类型
        run: npx tsc --noEmit

  # 测试通过后才构建镜像
  build-and-push:
    runs-on: ubuntu-latest
    needs: test  # 等待 test 任务通过
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout code / 检出代码
        uses: actions/checkout@v4

      - name: Set up QEMU / 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx / 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry / 登录 GitHub 容器仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata / 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image / 构建并推送镜像
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation / 生成制品证明
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Summary / 摘要
        run: |
          echo "✅ Docker image published successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
