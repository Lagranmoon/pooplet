name: Docker Hub Publish / Docker Hub 发布

# 可选配置：发布到 Docker Hub
# 需要设置以下 Secrets:
#   DOCKER_USERNAME - Docker Hub 用户名
#   DOCKER_PASSWORD - Docker Hub 访问令牌
#
# Optional: Publish to Docker Hub
# Requires the following Secrets:
#   DOCKER_USERNAME - Docker Hub username
#   DOCKER_PASSWORD - Docker Hub access token

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'latest'

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKER_USERNAME }}/pooplet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && secrets.DOCKER_USERNAME != ''

    steps:
      - name: Checkout code / 检出代码
        uses: actions/checkout@v4

      - name: Set up QEMU / 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx / 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub / 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push / 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ github.event.inputs.version }}
            ${{ env.DOCKERHUB_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary / 摘要
        run: |
          echo "✅ Docker image published to Docker Hub!"
          echo "📦 Image: ${{ env.DOCKERHUB_REPO }}"
          echo "🏷️ Tags: ${{ github.event.inputs.version }}, latest"
